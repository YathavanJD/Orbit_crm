services:
  - type: web
    name: crm-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URI
        sync: false   # set this in the Render dashboard to your MongoDB Atlas connection string
      - key: PYTHON_VERSION
        value: 3.11.9
